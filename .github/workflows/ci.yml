name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Boot test (server starts and exposes health endpoint)
        run: |
          TEST_MODE=LAB_FULLY_VULNERABLE npm start &
          SERVER_PID=$!
          sleep 5
          curl --fail --silent http://localhost:4000/.well-known/apollo/server-health
          kill $SERVER_PID
